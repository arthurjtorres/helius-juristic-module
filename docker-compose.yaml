version: "3.9"
services:
  application:
    env_file:
      - ../.env  # Caminho relativo para a pasta raiz
    build: .
    ports: 
      - ${PORT_API_IRREGULARIDADE}:${PORT_API_IRREGULARIDADE}
    environment:
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}  # Mesma configuração do banco
      - DB_HOST=${DB_HOST}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - .:/modulo-juridico
      - /modulo-juridico/node_modules

    container_name: modulo-juridico
    restart: always

    networks:
      - helius_net

networks:
  helius_net:
    external: true